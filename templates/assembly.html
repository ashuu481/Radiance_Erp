{% extends 'base.html' %}
{% block content %}

<h3>Assembly</h3>

<div class="card">
<form method="post">
<input name="part" placeholder="Part">
<input name="qty" placeholder="Qty">
<button>Add</button>
</form>
</div>

<div class="card">
<table>
<tr><th>Part</th><th>Qty</th></tr>
{% for i in data %}
<tr><td>{{ i['part'] }}</td><td>{{ i['qty'] }}</td></tr>
{% endfor %}
</table>
</div>

{% endblock %}
