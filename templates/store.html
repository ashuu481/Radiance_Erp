{% extends 'base.html' %}
{% block content %}

<h3>Stock</h3>

<a href="/export">📥 Export Excel</a>

{% if low %}
<p style="color:red;">⚠ Low Stock: {{ low }}</p>
{% endif %}

<div class="card">
<table>
<tr><th>Part</th><th>Qty</th></tr>

{% for i in data %}
<tr>
<td>{{ i['part'] }}</td>
<td>{{ i['qty'] }}</td>
</tr>
{% endfor %}

</table>
</div>

{% endblock %}
