{% extends 'base.html' %}

{% block content %}

<h3>Inventory</h3>

{% if low_stock %}
<div class="alert alert-danger">
⚠ Low Stock: {{ low_stock }}
</div>
{% endif %}

<div class="card p-3">

<table class="table table-hover">

<tr>
<th>Part</th>
<th>Quantity</th>
<th>QR</th>
</tr>

{% for i in data %}
<tr>
<td>{{ i['part'] }}</td>
<td>
<span class="badge bg-success">{{ i['qty'] }}</span>
</td>
<td>
<a href="/generate_qr/{{ i['part'] }}" class="btn btn-sm btn-info">
QR
</a>
</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
