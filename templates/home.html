{% extends 'base.html' %}
{% block content %}

<h2>Welcome to Radiance ERP</h2>

<div class="grid">

<a href="/inward" class="box">📥<br>Inward</a>
<a href="/store" class="box">📦<br>Inventory</a>
<a href="/production" class="box">🏭<br>Production</a>
<a href="/assembly" class="box">🛠<br>Assembly</a>
<a href="/quality" class="box">✔<br>Quality</a>
<a href="/dispatch" class="box">🚚<br>Dispatch</a>
<a href="/history" class="box">📊<br>Reports</a>
<a href="/settings" class="box">⚙<br>Settings</a>

</div>

<hr>

<h3>Stock Analytics</h3>

<div class="card">
<canvas id="barChart"></canvas>
</div>

<div class="card">
<canvas id="pieChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
var parts = [];
var qtys = [];

try {
    parts = JSON.parse('{{ parts | tojson | safe if parts is defined else "[]" }}');
    qtys = JSON.parse('{{ qtys | tojson | safe if qtys is defined else "[]" }}');
} catch(e){}

if(parts.length > 0){

new Chart(document.getElementById('barChart'), {
type:'bar',
data:{ labels:parts, datasets:[{data:qtys}] }
});

new Chart(document.getElementById('pieChart'), {
type:'pie',
data:{ labels:parts, datasets:[{data:qtys}] }
});

}
</script>

{% endblock %}
