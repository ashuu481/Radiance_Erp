{% extends 'base.html' %}
{% block content %}

<h3>Dashboard Analytics</h3>

<!-- 🔷 Charts Layout -->
<div style="display:flex; gap:20px; flex-wrap:wrap;">

    <!-- BAR CHART -->
    <div class="card" style="flex:1; min-width:300px;">
        <h4>Stock Quantity</h4>
        <canvas id="barChart"></canvas>
    </div>

    <!-- PIE CHART -->
    <div class="card" style="flex:1; min-width:300px;">
        <h4>Stock Distribution</h4>
        <canvas id="pieChart"></canvas>
    </div>

</div>

<!-- 🔷 SAFE DATA (NO JINJA ERROR) -->
<script>
var parts = [];
var qtys = [];

try {
    parts = JSON.parse('{{ parts | tojson | safe if parts is defined else "[]" }}');
    qtys = JSON.parse('{{ qtys | tojson | safe if qtys is defined else "[]" }}');
} catch (e) {
    parts = [];
    qtys = [];
}
</script>

<!-- 🔷 CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
if(parts.length > 0){

    // BAR CHART
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: parts,
            datasets: [{
                label: 'Stock Quantity',
                data: qtys
            }]
        }
    });

    // PIE CHART
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: parts,
            datasets: [{
                data: qtys
            }]
        }
    });

} else {

    document.getElementById("barChart").outerHTML = "<p>No data available</p>";
    document.getElementById("pieChart").outerHTML = "";

}
</script>

{% endblock %}
