{% extends 'base.html' %}
{% block content %}
{% if data and data|length > 0 %}

<table>
<tr>
<th>Part</th><th>Qty</th><th>Action</th><th>User</th><th>Date</th>
</tr>

{% for i in data %}
<tr>
<td>{{ i['part'] }}</td>
<td>{{ i['qty'] }}</td>
<td>{{ i['action'] }}</td>
<td>{{ i['user'] }}</td>
<td>{{ i['date'] }}</td>
</tr>
{% endfor %}
</table>

{% else %}

<p>No data found</p>

{% endif %}
<h3>History</h3>

<div class="card">
</div>

{% endblock %}
