{% extends 'base.html' %}
{% block content %}

<h3>Stock History</h3>

<table border="1">
<tr>
<th>Part</th>
<th>Qty</th>
<th>Action</th>
<th>User</th>
<th>Date</th>
</tr>

{% for i in data %}
<tr>
<td>{{ i['part'] }}</td>
<td>{{ i['qty'] }}</td>
<td>{{ i['action'] }}</td>
<td>{{ i['user'] }}</td>
<td>{{ i['date'] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
