<!DOCTYPE html>
<html>
<head>
    <title>Radiance ERP Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Login Card */
.login-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

/* Title */
.login-box h2 {
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #1e1e2f;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #000;
}

/* Footer */
.footer {
    margin-top: 10px;
    font-size: 12px;
    color: #777;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Radiance ERP</h2>

<form method="post">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<div class="footer">
    Secure Login System
</div>

</div>

</body>
</html>
