<!DOCTYPE html>
<html>
<head>
<title>Radiance Login</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    overflow:hidden;
}

/* 🔥 Animated Background Glow */
body::before{
    content:'';
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, #38bdf8, transparent);
    top:-150px;
    left:-150px;
    filter: blur(120px);
    animation: move 10s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, #22c55e, transparent);
    bottom:-150px;
    right:-150px;
    filter: blur(120px);
    animation: move 12s infinite alternate-reverse;
}

@keyframes move{
    0%{transform: translate(0,0);}
    100%{transform: translate(80px,60px);}
}

/* 🔥 Glass Card */
.card{
    position:relative;
    z-index:2;
    width:340px;
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align:center;
}

/* Center */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* 🔥 Brand */
.brand{
    font-size:26px;
    font-weight:700;
    background: linear-gradient(90deg,#38bdf8,#22c55e);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom:10px;
}

/* Subtitle */
.subtitle{
    font-size:13px;
    color:#94a3b8;
    margin-bottom:25px;
}

/* Inputs */
.input-box{
    position:relative;
    margin:15px 0;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
    background: rgba(255,255,255,0.08);
    color:white;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    background: rgba(255,255,255,0.15);
    box-shadow:0 0 10px #38bdf8;
}

/* Button */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background: linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform: translateY(-2px);
    box-shadow:0 10px 20px rgba(34,197,94,0.4);
}

/* Footer */
.footer{
    margin-top:15px;
    font-size:12px;
    color:#64748b;
}

/* Logo circle */
.logo{
    width:60px;
    height:60px;
    border-radius:50%;
    margin:auto;
    margin-bottom:10px;
    background: linear-gradient(135deg,#38bdf8,#22c55e);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    box-shadow:0 0 20px rgba(56,189,248,0.5);
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">🏭</div>

<div class="brand">Radiance Polymers</div>
<div class="subtitle">Smart Manufacturing ERP</div>

<form method="POST">

    <div class="input-box">
        <input type="text" name="username" placeholder="Username" required>
    </div>

    <div class="input-box">
        <input type="password" name="password" placeholder="Password" required>
    </div>

    <button type="submit">Login</button>

</form>

<div class="footer">Developed by Ashu</div>

</div>

</div>

</body>
</html>
