<!DOCTYPE html>
<html>
<head>
<title>Radiance Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    width:300px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.brand{
    text-align:center;
    font-size:22px;
    margin-bottom:10px;
    color:#38bdf8;
}
</style>
</head>

<body>

<div class="card">

<div class="brand">🏭 Radiance Polymers</div>

<h2>Login</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>

</div>

</body>
</html>
