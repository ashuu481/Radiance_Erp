<!DOCTYPE html>
<html>
<head>
<title>Radiance ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* 🌗 THEMES */
body.light { background: #f4f6f9; color: #000; }
body.dark { background: #0f172a; color: #fff; }

/* 🔥 NAVBAR (TESLA STYLE) */
.nav {
    background: rgba(20,20,30,0.7);
    backdrop-filter: blur(15px);
    padding: 15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* 🔥 BRAND CENTER */
.brand {
    text-align: center;
}

.brand .title {
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
    text-shadow: 0 0 12px rgba(56,189,248,0.6);
}

.brand .tagline {
    font-size: 11px;
    color: gray;
}

/* 🔥 USER INFO */
.user {
    font-size: 14px;
    opacity: 0.8;
}

/* 🔥 CONTAINER */
.container {
    padding: 25px;
}

/* 🔥 FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: gray;
    border-top: 1px solid rgba(255,255,255,0.1);
}

/* 🔥 BUTTON */
button {
    padding:10px;
    border:none;
    border-radius:10px;
    background: linear-gradient(135deg,#0ea5e9,#6366f1);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* 🔥 INPUT */
input {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* 🔥 TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<!-- 🔷 NAVBAR -->
<div class="nav">

    <div class="user">
        👤 {{ session.get('user') }} ({{ session.get('role') }})
    </div>

    <div class="brand">
        <div class="title">🏭 Radiance Polymers AI</div>
        <div class="tagline">Smart ERP & Automation</div>
    </div>

    <div>
        <button onclick="toggleTheme()">🌗</button>
    </div>

</div>

<!-- 🔷 CONTENT -->
<div class="container">
{% block content %}{% endblock %}
</div>

<!-- 🔷 FOOTER -->
<div class="footer">
© 2026 Radiance Polymers | AI Powered 🚀
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
    let savedTheme = localStorage.getItem("theme") || "dark";
    document.body.className = savedTheme;
});

function toggleTheme(){
    let current = document.body.className;
    let next = current === "dark" ? "light" : "dark";
    document.body.className = next;
    localStorage.setItem("theme", next);
}
</script>

</body>
</html>
