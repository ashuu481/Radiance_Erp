<!DOCTYPE html>
<html>
<head>
<title>Radiance ERP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<button onclick="toggleTheme()">🌗</button>
<style>

body {
    font-family: Arial;
    margin: 0;
    transition: 0.3s;
}

/* LIGHT MODE */
body.light {
    background: #f4f6f9;
    color: black;
}

/* DARK MODE */
body.dark {
    background: #121212;
    color: white;
}

.nav {
    background: #111;
    color: white;
    padding: 12px;
}

.nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.container {
    padding: 20px;
}

.card {
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

/* Light card */
body.light .card {
    background: white;
    box-shadow: 0 0 10px #ccc;
}

/* Dark card */
body.dark .card {
    background: #1e1e1e;
}

button {
    padding: 10px;
    border: none;
    cursor: pointer;
}

</style>

</head>

<body>

<div class="nav">

Radiance ERP |


<a href="/dashboard">Dashboard</a>
<a href="/inward">Inward</a>
<a href="/store">Store</a>
<a href="/production">Production</a>
<a href="/dispatch">Dispatch</a>
<a href="/history">History</a>
<a href="/scan">Scan</a>
<a href="/logout">Logout</a>
<!-- 👇 ROLE GREETING -->
<span style="float:right;">
👋 Welcome {{ session['user'] }} ({{ session['role'] }})
<script>

// load saved theme
let theme = localStorage.getItem("theme") || "light";
document.body.className = theme;

function toggleTheme(){
    if(document.body.className === "light"){
        document.body.className = "dark";
        localStorage.setItem("theme", "dark");
    } else {
        document.body.className = "light";
        localStorage.setItem("theme", "light");
    }
}

</script>
</span>
</div>

<div class="container">
<div class="card">

{% block content %}{% endblock %}

</div>
</div>

</body>
</html>
