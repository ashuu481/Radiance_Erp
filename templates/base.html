<!DOCTYPE html>
<html>
<head>
<title>Radiance ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* BRAND SECTION */
.brand .title {
    font-size: 24px;
    font-weight: bold;
    .brand .title {
    font-size: 24px;
    font-weight: bold;
    color: #00bcd4;
    text-shadow: 0 0 8px rgba(0,188,212,0.5);
}
}

.brand .tagline {
    font-size: 12px;
    color: gray;
}

/* NAV IMPROVEMENT */
.nav {
    background: linear-gradient(90deg, #1e1e2f, #2c2c54);
    padding: 15px;
}

/* FOOTER PREMIUM */
.footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    color: gray;
    border-top: 1px solid #444;
}
.footer {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: gray;
    margin-top: 20px;
}
    /* DASHBOARD GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

/* BOX BUTTONS */
.box {
    text-decoration: none;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    font-size: 18px;
    transition: 0.3s;
    font-weight: bold;
}

/* LIGHT MODE */
body.light .box {
    background: white;
    color: black;
    box-shadow: 0 5px 15px #ccc;
}

/* DARK MODE */
body.dark .box {
    background: #1e1e1e;
    color: white;
}

/* HOVER EFFECT */
.box:hover {
    transform: translateY(-5px) scale(1.05);
}
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.3s;
}

/* THEMES */
body.light { background: #f4f6f9; color: #000; }
body.dark { background: #121212; color: #fff; }

/* NAVBAR */
.nav {
    background: #111;
    color: white;
    padding: 12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav a {
    color: white;
    margin: 8px;
    text-decoration: none;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* CARD */
.card {
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

body.light .card { background:white; box-shadow:0 0 10px #ccc; }
body.dark .card { background:#1e1e1e; }

/* BUTTON */
button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
    cursor:pointer;
}

/* INPUT */
input {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<!-- 🔷 NAVBAR -->
<div class="nav">

<div class="brand">
    <div class="title">🏭 Radiance Polymers AI System</div>
    <div class="tagline">Smart Inventory & ERP System</div>
</div>

<div>
{% if session.get('user') %}
👤 {{ session.get('user') }} ({{ session.get('role') }})
{% endif %}
<h1 style="text-align:center; font-size:32px;">
       
</h1>
<button onclick="toggleTheme()">🌗</button>
</div>

</div>
<!-- 🔷 SINGLE CONTENT BLOCK -->
<div class="container">
{% block content %}{% endblock %}
</div>

<!-- 🔷 THEME SCRIPT (SAFE) -->
<script>
document.addEventListener("DOMContentLoaded", function(){

    let savedTheme = localStorage.getItem("theme");

    if(!savedTheme){
        savedTheme = "light";
    }

    document.body.className = savedTheme;

});

function toggleTheme(){

    let current = document.body.className;

    if(current === "dark"){
        document.body.className = "light";
        localStorage.setItem("theme", "light");
    } else {
        document.body.className = "dark";
        localStorage.setItem("theme", "dark");
    }

}
</script>
<div class="footer">
© 2026 Radiance Polymers | Developed by Ashu 🚀
</div>


</body>
</html>
