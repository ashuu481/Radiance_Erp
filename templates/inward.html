{% extends 'base.html' %}
{% block content %}

<h3>Inward Entry</h3>

<div class="card">
<form method="post">
<input name="part" placeholder="Part" value="{{ part }}">
<input name="qty" placeholder="Qty">
<input name="type" placeholder="Type">
<button>Add</button>
</form>
</div>

<div class="card">
<table>
<tr><th>Part</th><th>Qty</th><th>Type</th></tr>

{% for i in data %}
<tr>
<td>{{ i['part'] }}</td>
<td>{{ i['qty'] }}</td>
<td>{{ i['type'] }}</td>
</tr>
{% endfor %}

</table>
</div>

{% endblock %}
