{% extends 'base.html' %}
{% block content %}

<h3>Scan QR</h3>

<video id="preview" width="100%"></video>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const html5QrCode = new Html5Qrcode("preview");

html5QrCode.start(
    { facingMode: "environment" },
    {},
    (decodedText) => {
        window.location.href = "/inward?part=" + decodedText;
    }
);
</script>

{% endblock %}
