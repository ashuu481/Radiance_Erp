{% extends 'base.html' %}
{% block content %}

<h3>Quality Check</h3>

<div class="card">
<form method="post">
<input name="part" placeholder="Part">
<input name="status" placeholder="Pass / Fail">
<button>Submit</button>
</form>
</div>

<div class="card">
<table>
<tr><th>Part</th><th>Status</th></tr>
{% for i in data %}
<tr><td>{{ i['part'] }}</td><td>{{ i['status'] }}</td></tr>
{% endfor %}
</table>
</div>

{% endblock %}
