<!DOCTYPE html>
<html>
<head>
    <title>Radiance Inspection</title>

    <style>
        body {
            text-align:center;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        h2 {
            font-size:28px;
            margin-top:20px;
        }

        video, img {
            border-radius:15px;
            margin-top:10px;
        }

        button {
            padding:10px 20px;
            margin:10px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .start { background:green; color:white; }
        .stop { background:red; color:white; }

        .status-ok {
            background:green;
            padding:10px;
            border-radius:10px;
        }

        .status-defect {
            background:red;
            padding:10px;
            border-radius:10px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity:0.5; }
        }
    </style>
</head>

<body>

<h2>🔍 Radiance Live Inspection</h2>

<video id="video" autoplay playsinline width="300"></video>
<canvas id="canvas" style="display:none;"></canvas>

<br>

<img id="output" width="300">

<br>

<button class="start" onclick="startCamera()">▶ Start</button>
<button class="stop" onclick="stopCamera()">⛔ Stop</button>

<h3 id="status">Waiting...</h3>
<h4>Total Defects: <span id="count">0</span></h4>

<audio id="alarm" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let alarm = document.getElementById("alarm");

let interval;
let lastState = "OK";

async function startCamera(){

    // unlock sound for mobile
    alarm.play().then(()=>{
        alarm.pause();
        alarm.currentTime = 0;
    });

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    interval = setInterval(captureFrame, 700);
}

function stopCamera(){
    video.srcObject.getTracks().forEach(track => track.stop());
    clearInterval(interval);
}

function captureFrame(){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let image = canvas.toDataURL("image/jpeg", 0.5);

    fetch('/detect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: image })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("status").innerText = data.result;
        document.getElementById("count").innerText = data.count;

        document.getElementById("output").src = data.image;

        // UI color change
        if(data.result.includes("DEFECT")){
            document.getElementById("status").className = "status-defect";

            alarm.loop = true;
            alarm.play();

        } else {
            document.getElementById("status").className = "status-ok";

            alarm.pause();
            alarm.currentTime = 0;
        }
    });
}
</script>

</body>
</html>
