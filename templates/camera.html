<!DOCTYPE html>
<html>
<head>
    <title>Radiance AI Inspection</title>

    <style>
        body {
            text-align:center;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        h2 {
            font-size:28px;
            margin-top:20px;
        }

        video, img {
            border-radius:15px;
            margin-top:10px;
        }

        button {
            padding:10px 20px;
            margin:10px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .start { background:green; color:white; }
        .stop { background:red; color:white; }

        .status-ok {
            background:green;
            padding:10px;
            border-radius:10px;
        }

        .status-defect {
            background:red;
            padding:10px;
            border-radius:10px;
            animation: blink 1s infinite;
        }

        .status-scan {
            background:orange;
            padding:10px;
            border-radius:10px;
        }

        @keyframes blink {
            50% { opacity:0.5; }
        }
    </style>
</head>

<body>

<h2>🏭 Radiance Smart Inspection</h2>

<video id="video" autoplay playsinline width="300"></video>
<canvas id="canvas" style="display:none;"></canvas>

<br>

<img id="output" width="300">

<br>

<button class="start" onclick="startCamera()">▶ Start</button>
<button class="stop" onclick="stopCamera()">⛔ Stop</button>

<h3 id="status">Starting...</h3>
<h4>Current Defects: <span id="count">0</span></h4>
<h4>Total Saved: <span id="total">0</span></h4>

<audio id="alarm" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let alarm = document.getElementById("alarm");

let interval;
let stableCount = 0;

// 🚀 START CAMERA
async function startCamera(){
    try {

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;

        // 🔊 unlock audio for mobile
        alarm.play().then(()=>{
            alarm.pause();
            alarm.currentTime = 0;
        });

        interval = setInterval(captureFrame, 1000);

    } catch(err){
        alert("Camera error: " + err.message);
        console.error(err);
    }
}

// ⛔ STOP CAMERA
function stopCamera(){
    if(video.srcObject){
        video.srcObject.getTracks().forEach(track => track.stop());
    }
    clearInterval(interval);

    alarm.pause();
    alarm.currentTime = 0;
}

// 📸 CAPTURE FRAME
function captureFrame(){

    if(!video.videoWidth) return;  // safety

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let image = canvas.toDataURL("image/jpeg", 0.5);

    fetch('/detect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: image })
    })
    .then(res => res.json())
    .then(data => {

        let status = document.getElementById("status");

        // 🎯 STATUS CONTROL
        if(data.result.includes("NO PART")){
            status.innerText = "No Part ❌";
            status.className = "";
        }
        else if(data.result.includes("DEFECT")){
            status.innerText = data.result;
            status.className = "status-defect";
        }
        else if(data.result.includes("SCANNING")){
            status.innerText = "Scanning...";
            status.className = "status-scan";
        }
        else{
            status.innerText = "OK ✅";
            status.className = "status-ok";
        }

        // update counters
        document.getElementById("count").innerText = data.count || 0;
        document.getElementById("total").innerText = data.total || 0;

        // show processed image
        if(data.image){
            document.getElementById("output").src = data.image;
        }

        // 🔊 STABLE ALARM
        if(data.result.includes("DEFECT")){
            stableCount++;

            if(stableCount >= 2){
                alarm.loop = true;
                alarm.play();
            }
        } else {
            stableCount = 0;
            alarm.pause();
            alarm.currentTime = 0;
        }

    })
    .catch(err => {
        console.error("Fetch error:", err);
    });
}

// 🔥 AUTO START (optional)
// window.onload = startCamera;

</script>

</body>
</html>
