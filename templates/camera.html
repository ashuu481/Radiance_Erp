{% extends 'base.html' %}
{% block content %}

<h2 style="text-align:center;">📱 Live Inspection</h2>

<div style="text-align:center;">
    <video id="video" autoplay playsinline width="300" style="border-radius:15px;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <br><br>

    <button onclick="startCamera()" class="btn">▶ Start</button>
    <button onclick="stopCamera()" class="btn" style="background:red;">⛔ Stop</button>

    <h3 id="status">Waiting...</h3>
</div>

<audio id="alarm" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let alarm = document.getElementById("alarm");

let interval;
let lastState = "OK";

async function startCamera(){

    // 🔊 unlock audio (important for mobile)
    alarm.play().then(() => {
        alarm.pause();
        alarm.currentTime = 0;
    });

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    interval = setInterval(captureFrame, 2000);
}

function stopCamera(){
    video.srcObject.getTracks().forEach(track => track.stop());
    clearInterval(interval);
}

function captureFrame(){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let image = canvas.toDataURL("image/jpeg", 0.5);

    fetch('/detect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: image })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("status").innerText = data.result;

        // 🔊 sound alert
        if(data.result.includes("DEFECT") && lastState !== "DEFECT"){
            alarm.play();
            lastState = "DEFECT";
        }

        if(data.result.includes("OK")){
            lastState = "OK";
        }
    });
}
</script>

{% endblock %}
