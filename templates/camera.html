<!DOCTYPE html>
<html>
<head>
    <title>Radiance Inspection</title>

    <style>
        body {
            text-align:center;
            font-family:Arial;
            background:#0f172a;
            color:white;
        }

        h2 {
            font-size:28px;
            margin-top:20px;
        }

        video, img {
            border-radius:15px;
            margin-top:10px;
        }

        button {
            padding:10px 20px;
            margin:10px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .start { background:green; color:white; }
        .stop { background:red; color:white; }

        .status-ok {
            background:green;
            padding:10px;
            border-radius:10px;
        }

        .status-defect {
            background:red;
            padding:10px;
            border-radius:10px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity:0.5; }
        }
    </style>
</head>

<body>

<h2>🔍 Radiance Live Inspection</h2>

<video id="video" autoplay playsinline width="300"></video>
<canvas id="canvas" style="display:none;"></canvas>

<br>

<img id="output" width="300">

<br>

<button class="start" onclick="startCamera()">▶ Start</button>
<button class="stop" onclick="stopCamera()">⛔ Stop</button>

<h3 id="status">Waiting...</h3>
<h4>Total Defects: <span id="count">0</span></h4>

<audio id="alarm" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let alarm = document.getElementById("alarm");

let interval;
let stableCount = 0;   // 🔥 stability control

async function startCamera(){
    try {

        alert("Starting camera...");

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;

        alert("Camera started!");

        interval = setInterval(captureFrame, 700);

    } catch(err){
        alert("Camera error: " + err);
        console.error(err);
    }
}

function stopCamera(){
    video.srcObject.getTracks().forEach(track => track.stop());
    clearInterval(interval);
}

function captureFrame(){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let image = canvas.toDataURL("image/jpeg", 0.5);

    fetch('/detect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: image })
    })
    .then(res => res.json())
    .then(data => {

        let status = document.getElementById("status");

        // 🔥 STATUS CONTROL (NO FALSE OK)
        if(data.result.includes("DEFECT")){
            status.innerText = data.result;
            status.className = "status-defect";
        }
        else if(data.result === "SCANNING..."){
            status.innerText = "Scanning...";
            status.className = "";
        }
        else{
            status.innerText = "OK ✅";
            status.className = "status-ok";
        }

        // Update count
        document.getElementById("count").innerText = data.count;

        // Show processed image
        if(data.image){
            document.getElementById("output").src = data.image;
        }

        // 🔊 STABLE ALARM LOGIC
        if(data.result.includes("DEFECT")){
            stableCount++;

            if(stableCount >= 2){   // 🔥 confirm defect
                alarm.loop = true;
                alarm.play();
            }

        } else {
            stableCount = 0;
            alarm.pause();
            alarm.currentTime = 0;
        }

    })
    .catch(err => {
        console.error("Fetch error:", err);
    });
}
</script>

</body>
</html>
