{% extends 'base.html' %}

{% block content %}

<h3>Dispatch</h3>

<div class="card p-3 mb-4">

<form method="post" class="row g-3">

<div class="col-md-5">
<input name="part" class="form-control" placeholder="Part No" required>
</div>

<div class="col-md-5">
<input name="qty" type="number" class="form-control" placeholder="Quantity" required>
</div>

<div class="col-md-2">
<button class="btn btn-success w-100">
<i class="bi bi-truck"></i> Dispatch
</button>
</div>

</form>

</div>

<div class="card p-3">

<h5>Dispatch History</h5>

<table class="table table-striped">
<tr>
<th>ID</th><th>Part</th><th>Qty</th><th>Date</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
